spring:
  application:
    name: ecom-app
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: true
        web-allow-others: false
  datasource:
    url: jdbc:h2:mem:test

logging:
  level:
    org.hibernate.SQL: DEBUG           # see SQL in dev
    org.hibernate.orm.jdbc.bind: TRACE # see bind params